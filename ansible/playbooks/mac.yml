---
# ---------------------------------------------------------------------------
# macOS Provisioning Playbook
# ---------------------------------------------------------------------------
# Run: cd ~/dots/ansible && ansible-playbook playbooks/mac.yml
# ---------------------------------------------------------------------------

- name: Provision macOS workstation
  hosts: mac
  gather_facts: true
  become: false   # macOS provisioning runs as the standard user throughout.
                  # Homebrew, dotfiles, and SSH keys must NOT run as root.
                  # Individual tasks that need sudo should opt in explicitly.

  pre_tasks:
    - name: Verify we are running on macOS
      ansible.builtin.assert:
        that: ansible_facts['os_family'] == "Darwin"
        fail_msg: "This playbook is for macOS only. Use linux.yml for Linux hosts."

    # Compute user_home and dotfiles_dir once here; all roles consume them.
    # ansible_facts['user_id'] is safe on macOS: gather_facts runs as the
    # login user (become: false at play level), so user_id is never 'root'.
    # The dotfiles repo is always cloned directly into the user's home directory.
    - name: Set user_home and dotfiles_dir
      ansible.builtin.set_fact:
        user_home: "/Users/{{ ansible_facts['user_id'] }}"
        dotfiles_dir: "/Users/{{ ansible_facts['user_id'] }}/dots"

  roles:
    - role: homebrew
      tags: [homebrew, brew]

    - role: shell
      tags: [shell, zsh]

    - role: dotfiles_mac
      tags: [dotfiles, symlinks, config]

    - role: ssh_mac
      tags: [ssh, keys]
