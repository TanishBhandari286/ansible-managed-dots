---
# ---------------------------------------------------------------------------
# Linux Provisioning Playbook
# ---------------------------------------------------------------------------
# Run: cd ~/dots/ansible && ansible-playbook playbooks/linux.yml
# ---------------------------------------------------------------------------

- name: Provision Linux servers / VPS
  hosts: linux
  gather_facts: true

  pre_tasks:
    - name: Verify we are running on Linux
      ansible.builtin.assert:
        that: ansible_facts['os_family'] in ["Debian", "RedHat", "Archlinux"]
        fail_msg: "This playbook targets Debian/Ubuntu or RHEL-based Linux systems."

    - name: Update apt cache (Debian/Ubuntu only)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"
      become: true

    # Compute user_home and dotfiles_dir once here; all roles consume them.
    # ansible_user is the inventory SSH login user (vps / master-node / server-node).
    # With become=False globally, gather_facts runs as ansible_user, so
    # ansible_facts['user_id'] == ansible_user — but we prefer ansible_user
    # because it is set explicitly in the inventory and does not depend on
    # how facts are gathered.
    - name: Set user_home and dotfiles_dir
      ansible.builtin.set_fact:
        user_home: "/home/{{ ansible_user }}"
        dotfiles_dir: "/home/{{ ansible_user }}/dots"

  roles:
    # needs root — apt install, chsh, /etc/shells
    - { role: packages_linux,  become: true,  tags: [packages, apt] }

    # must run as standard user — writes into user home directory
    - { role: shell,           become: false, tags: [shell, zsh] }
    - { role: dotfiles_linux,  become: false, tags: [dotfiles, symlinks, config] }
    - { role: ssh_linux,       become: false, tags: [ssh, keys] }
