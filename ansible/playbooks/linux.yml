---
# ---------------------------------------------------------------------------
# Linux Provisioning Playbook
# ---------------------------------------------------------------------------
# Run: cd ~/dots/ansible && ansible-playbook playbooks/linux.yml -K
# ---------------------------------------------------------------------------

- name: Provision Linux servers / VPS
  hosts: linux
  gather_facts: true

  pre_tasks:
    - name: Verify we are running on Linux
      ansible.builtin.assert:
        that: ansible_facts['os_family'] in ["Debian", "RedHat", "Archlinux"]
        fail_msg: "This playbook targets Debian/Ubuntu or RHEL-based Linux systems."

    - name: Update apt cache (Debian/Ubuntu only)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"
      become: true

    # Resolve the real OS username at runtime. ansible_user is the inventory
    # alias (e.g. "server-node") which may not match /etc/passwd. Cached facts
    # hold "root" from the become: true phase above. whoami with become: false
    # returns the exact string the OS has for the SSH-connected user.
    - name: Capture real executing username via whoami
      ansible.builtin.command: whoami
      register: _real_user
      changed_when: false
      become: false

    - name: Override user_home and dotfiles_dir with real OS username
      ansible.builtin.set_fact:
        user_home: "/home/{{ _real_user.stdout }}"
        dotfiles_dir: "/home/{{ _real_user.stdout }}/dots"
      become: false

  roles:
    # needs root — apt install, chsh, /etc/shells
    - { role: packages_linux,  become: true,  tags: [packages, apt] }

    # must run as standard user — writes into user home directory
    - { role: shell,           become: false, tags: [shell, zsh] }
    - { role: dotfiles_linux,  become: false, tags: [dotfiles, symlinks, config] }
    - { role: ssh_linux,       become: false, tags: [ssh, keys] }
