---
# ---------------------------------------------------------------------------
# Linux Provisioning Playbook
# ---------------------------------------------------------------------------
# Run: cd ~/dots/ansible && ansible-playbook playbooks/linux.yml
#
# What this playbook does:
#   1. Installs apt packages (git, zsh, neovim, curl, ripgrep, fzf, tmux…)
#   2. Installs Zsh and sets it as the default shell
#   3. Installs Node.js 20 LTS + build-essential via NodeSource
#   4. Installs Docker Engine via official apt repository
#   5. Clones ~/dots repo (idempotent) and runs install.sh to create symlinks
#   6. Injects FIDO2 public keys into authorized_keys (owner only — skip with --skip-tags ssh)
# ---------------------------------------------------------------------------

- name: Provision Linux servers / VPS
  hosts: linux
  gather_facts: true

  pre_tasks:
    - name: Verify we are running on Linux
      ansible.builtin.assert:
        that: ansible_facts['os_family'] in ["Debian", "RedHat", "Archlinux"]
        fail_msg: "This playbook targets Debian/Ubuntu or RHEL-based Linux systems."

    - name: Update apt cache (Debian/Ubuntu only)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"
      become: true

    # ansible_user is the inventory SSH login user (vps / master-node / server-node).
    # With become=False globally, gather_facts runs as ansible_user.
    - name: Set user_home
      ansible.builtin.set_fact:
        user_home: "/home/{{ ansible_user }}"

  roles:
    # System bootstrap — needs root
    - { role: packages_linux,  become: true,  tags: [packages, apt] }
    - { role: shell,           become: true,  tags: [shell, zsh] }
    - { role: node_linux,      become: true,  tags: [node, nodejs, devtools] }
    - { role: docker_linux,    become: true,  tags: [docker, containers] }

    # Dotfiles — runs as login user, no root needed
    - { role: dotfiles,        become: false, tags: [dotfiles, symlinks, config] }

    # SSH key injection — owner only, strangers skip with --skip-tags ssh
    - { role: ssh_linux,       become: false, tags: [ssh, keys] }
