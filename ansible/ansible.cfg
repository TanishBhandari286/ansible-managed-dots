[defaults]
inventory           = inventory/hosts.ini
roles_path          = roles
collections_paths   = ~/.ansible/collections
vault_password_file = .vault_pass
host_key_checking   = False
stdout_callback = default
result_format = yaml
timeout             = 30
interpreter_python  = auto_silent

# M2M automation key — passphraseless, used exclusively by Ansible.
# FIDO/YubiKey interactive keys are never loaded during playbook runs.
private_key_file    = ~/.ssh/id_ed25519_ansible

[privilege_escalation]
become          = True
become_method   = sudo
become_ask_pass = False

[ssh_connection]
# Use Homebrew's modern OpenSSH binary (fixes FIDO2 YubiKey compat on macOS)
ssh_executable = /opt/homebrew/bin/ssh

# Multiplexing: reuse the same TCP connection across all tasks to a host.
# ControlPath uses a hash to keep socket path short (avoids "too long" errors).
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o ControlPath=/tmp/ansible-%%h-%%p-%%r

# Stream commands via stdin — eliminates requiretty/sudo TTY hangs.
pipelining = True