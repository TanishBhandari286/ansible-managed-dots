[defaults]
inventory           = inventory/hosts.ini
roles_path          = roles
collections_paths   = ~/.ansible/collections
vault_password_file = .vault_pass
host_key_checking   = False
stdout_callback = default
result_format = yaml
timeout             = 30
interpreter_python  = auto_silent

# M2M automation key — passphraseless, used exclusively by Ansible.
# FIDO/YubiKey interactive keys are never loaded during playbook runs.
private_key_file    = ~/.ssh/id_ed25519_ansible

[privilege_escalation]
# become is deliberately False at the global level.
# Fact gathering, ad-hoc commands, and all tasks default to the SSH login user.
# Tasks that need root opt in explicitly with `become: true` at the task or role level.
# This prevents gather_facts from caching ansible_user_id as 'root' and avoids
# files/symlinks being written to /root instead of the target user's home directory.
become          = False
become_method   = sudo
become_ask_pass = False

[ssh_connection]
# Use Homebrew's modern OpenSSH binary (fixes FIDO2 YubiKey compat on macOS).
ssh_executable = /opt/homebrew/bin/ssh

# Multiplex connections: reuse one TCP session across all tasks to a host.
#
# ControlPath uses %C — OpenSSH's SHA-1 hash of %l%h%p%r (local hostname +
# remote host + port + remote user). This produces a short, fixed-length,
# collision-free socket name. Using %%h-%%p-%%r directly risks "path too long"
# errors and creates ambiguous sockets when the same host is reached under
# different inventory aliases.
#
# ControlPersist=60s: the master connection lingers for 60 seconds after the
# last session closes, covering the gap between consecutive tasks in a play.
# 600s (10 min) kept sockets alive across separate ansible-playbook invocations,
# which caused the stale-user bug: a socket opened as 'vps' was reused by a
# subsequent run targeting a different user on the same host.
#
# control_path_dir: Ansible's connection plugin creates and uses this directory.
# ~/.ansible/cp/ is private to the user; /tmp/ is world-readable and is not
# cleaned between reboots on all systems.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

control_path_dir = ~/.ansible/cp

# Stream commands via stdin — eliminates requiretty/sudo TTY hangs.
pipelining = True