---
# ---------------------------------------------------------------------------
# Role: shell — Install Zsh and set it as the default shell
# ---------------------------------------------------------------------------
# Responsibilities:
#   - apt install zsh (Linux only)
#   - Ensure /etc/shells lists zsh (Linux only)
#   - chsh to set zsh as the default shell (Linux only)
#
# NOT this role's job:
#   - Pushing .zshrc                → install.sh (via dotfiles role)
#   - Creating dotfiles_dir         → dotfiles role (git clone)
#   - Creating ~/.config            → dotfiles role
# ---------------------------------------------------------------------------

# ---- Linux: install and set default shell ----------------------------------
- name: "[Linux] Install Zsh via apt"
  ansible.builtin.apt:
    name: zsh
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]

- name: "[Linux] Ensure Zsh is in /etc/shells"
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: /bin/zsh
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]

- name: "[Linux] Set Zsh as default shell for current user"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    shell: /bin/zsh
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]
