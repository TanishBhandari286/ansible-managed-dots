---

- name: "[Linux] Install Zsh via apt"
  ansible.builtin.apt:
    name: zsh
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]

- name: "[Linux] Ensure Zsh is in /etc/shells"
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: /bin/zsh
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]

- name: "[Linux] Set Zsh as default shell for current user"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    shell: /bin/zsh
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]
