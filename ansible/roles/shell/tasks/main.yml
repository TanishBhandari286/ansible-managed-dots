---
# ---------------------------------------------------------------------------
# Role: shell — Install Zsh (Linux only), push .zshrc, and symlink it
# ---------------------------------------------------------------------------

# ---- Linux: install and set default shell --------------------------------
- name: "[Linux] Install Zsh via apt"
  ansible.builtin.apt:
    name: zsh
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]

- name: "[Linux] Ensure Zsh is in /etc/shells"
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: /bin/zsh
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]

- name: "[Linux] Set Zsh as default shell for current user"
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    shell: /bin/zsh
  become: true
  when: ansible_facts['os_family'] == "Debian"
  tags: [zsh_install]

# ---- Push dotfiles to remote before symlinking -----------------------------
# src: uses the Mac control node's local path (lookup runs on localhost).
# The trailing slash on src is intentional: it copies the *contents*, not
# the directory itself, so we copy .zshrc as a file, not a subdirectory.

- name: "Ensure remote dotfiles_dir exists"
  ansible.builtin.file:
    path: "{{ dotfiles_dir }}"
    state: directory
    mode: "0755"
  tags: [zshrc]

- name: "Push .zshrc from control node to remote dotfiles_dir"
  ansible.builtin.copy:
    src: "{{ lookup('env', 'HOME') }}/dots/.zshrc"
    dest: "{{ dotfiles_dir }}/.zshrc"
    mode: "0644"
  tags: [zshrc]

# ---- Symlink .zshrc --------------------------------------------------------
- name: "Symlink .zshrc to ~/"
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/.zshrc"
    dest: "{{ user_home }}/.zshrc"
    state: link
    force: true
  tags: [zshrc]
