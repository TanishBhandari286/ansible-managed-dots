---

- name: Fetch GitHub host key via ssh-keyscan
  ansible.builtin.command:
    cmd: ssh-keyscan -t ed25519 github.com
  register: github_hostkey
  changed_when: false
  become: false

- name: Add GitHub host key to ~/.ssh/known_hosts
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ github_hostkey.stdout_lines | select('search', 'ssh-ed25519') | first }}"
    path: "{{ user_home }}/.ssh/known_hosts"
    state: present
  become: false

- name: Ensure ~/.ssh/config exists
  ansible.builtin.file:
    path: "{{ user_home }}/.ssh/config"
    state: touch
    mode: "0600"
    owner: "{{ ansible_user }}"
    modification_time: preserve
    access_time: preserve
  become: false

- name: Add GitHub SSH config block for automation key
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.ssh/config"
    marker: "# {mark} ANSIBLE MANAGED — github.com automation key"
    block: |
      Host github.com
        HostName github.com
        User git
        IdentityFile ~/.ssh/id_ed25519_ansible
        IdentitiesOnly yes
    mode: "0600"
    create: false
  become: false
