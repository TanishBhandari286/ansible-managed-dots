---
# ---------------------------------------------------------------------------
# Role: dotfiles — Sync the dotfiles repo and apply symlinks via install.sh
# ---------------------------------------------------------------------------
# Variables consumed (all from group_vars/all/vars.yml):
#   dotfiles_repo_url  — git remote URL
#   dotfiles_dir       — {{ ansible_env.HOME }}/dots  (resolves per-host)
# ---------------------------------------------------------------------------

# Ensure ~/.config exists before install.sh runs
- name: Ensure ~/.config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: "0755"
  become: false

# Clone if absent; pull and fast-forward if already present.
# force: true   — discards local uncommitted changes so git pull never blocks.
# accept_hostkey — accepts GitHub's host key non-interactively on first connect.
# GIT_TERMINAL_PROMPT=0 — aborts immediately on any credential prompt instead
#                         of hanging the playbook on a non-interactive shell.
- name: Ensure dotfiles repo is present and up to date
  ansible.builtin.git:
    repo: "{{ dotfiles_repo_url }}"
    dest: "{{ dotfiles_dir }}"
    version: main
    update: true
    force: true
    accept_hostkey: true
  environment:
    GIT_TERMINAL_PROMPT: "0"
  become: false

# Run install.sh from inside dotfiles_dir so the script can resolve its own
# path correctly via dirname. chdir is safer than passing an absolute cmd path.
- name: Run install.sh to apply symlinks
  ansible.builtin.command:
    cmd: ./install.sh
    chdir: "{{ dotfiles_dir }}"
  become: false
  register: install_out
  changed_when: "'✓' in install_out.stdout"

- name: Show install.sh output
  ansible.builtin.debug:
    msg: "{{ install_out.stdout_lines }}"
