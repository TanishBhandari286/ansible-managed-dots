---

- name: Ensure ~/.config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['user']['dir'] | default(ansible_facts['env']['HOME']) }}/.config"
    state: directory
    mode: "0755"
  become: false

- name: Ensure dotfiles repo is present and up to date
  ansible.builtin.git:
    repo: "{{ dotfiles_repo_url }}"
    dest: "{{ dotfiles_dir }}"
    version: main
    update: true
    force: true
    accept_hostkey: true
  environment:
    GIT_TERMINAL_PROMPT: "0"
    GIT_SSH_COMMAND: "ssh -i {{ ansible_facts['env']['HOME'] }}/.ssh/id_ed25519_ansible -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
  become: false

- name: Get current git remote URL
  ansible.builtin.command:
    cmd: git remote get-url origin
    chdir: "{{ dotfiles_dir }}"
  register: current_remote_url
  changed_when: false
  become: false

- name: Fix origin remote to use SSH URL
  ansible.builtin.command:
    cmd: git remote set-url origin {{ dotfiles_repo_url }}
    chdir: "{{ dotfiles_dir }}"
  when: current_remote_url.stdout != dotfiles_repo_url
  changed_when: true
  become: false

- name: Run install.sh to apply symlinks
  ansible.builtin.command:
    cmd: ./install.sh
    chdir: "{{ dotfiles_dir }}"
  become: false
  register: install_out
  changed_when: "'✓' in install_out.stdout"

- name: Show install.sh output
  ansible.builtin.debug:
    msg: "{{ install_out.stdout_lines }}"
