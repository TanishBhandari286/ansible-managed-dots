---
# ---------------------------------------------------------------------------
# docker_linux/tasks/service.yml
# Ensure the Docker daemon is enabled and running.
# ---------------------------------------------------------------------------

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: false
  become: true

- name: Enable and start containerd service
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
    daemon_reload: false
  become: true
