---
# ---------------------------------------------------------------------------
# docker_linux/tasks/install.yml
# Install Docker Engine via the official Docker apt repository.
# Uses the modern signed-by keyring approach; never uses deprecated apt-key.
# ---------------------------------------------------------------------------

# ---- Prerequisites ---------------------------------------------------------
- name: Install apt prerequisites for Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: false   # cache updated by playbook pre_tasks
  become: true

# ---- GPG keyring -----------------------------------------------------------
- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false   # idempotent: only downloads when file is absent
  become: true

# ---- apt repository --------------------------------------------------------
- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    # Signed-by points to the keyring downloaded above.
    # ansible_facts['architecture'] gives x86_64 / aarch64 etc.
    # dpkg --print-architecture gives amd64 / arm64 etc. — use lsb_codename for suite.
    repo: >-
      deb [arch={{ docker_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts['lsb']['codename'] }} stable
    state: present
    filename: docker
    update_cache: true   # refresh after adding the new source
  become: true
  vars:
    # Map Ansible architecture names to dpkg/Docker architecture names.
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf

# ---- Packages --------------------------------------------------------------
- name: Install Docker Engine packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: false   # just refreshed above when the repo was added
  become: true
