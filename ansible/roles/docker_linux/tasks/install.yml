---
# ---------------------------------------------------------------------------
# docker_linux/tasks/install.yml
# Install Docker Engine via the official Docker apt repository.
# Uses the modern signed-by keyring approach; never uses deprecated apt-key.
# ---------------------------------------------------------------------------

# ---- Prerequisites ---------------------------------------------------------
- name: Install apt prerequisites for Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: false   # cache updated by playbook pre_tasks
  become: true

# ---- GPG keyring -----------------------------------------------------------
- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false   # idempotent: only downloads when file is absent
  become: true

# ---- apt repository (deb822 format) ----------------------------------------
# deb822_repository writes /etc/apt/sources.list.d/docker.sources in the
# modern RFC-822 key-value format. It replaces the deprecated apt_repository
# module and will not be removed in ansible-core 2.25.
- name: Add Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_facts['lsb']['codename'] }}"
    components: stable
    architectures: "{{ docker_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
  become: true
  vars:
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf
  register: docker_repo

# deb822_repository has no update_cache parameter — refresh explicitly when
# the source file was just written or changed.
- name: Update apt cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: docker_repo.changed

# ---- Packages --------------------------------------------------------------
- name: Install Docker Engine packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: false   # just refreshed above when the repo was added
  become: true
