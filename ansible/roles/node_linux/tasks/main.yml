---
# ---------------------------------------------------------------------------
# Role: node_linux — Install Node.js 20 LTS + build-essential on Debian/Ubuntu
# ---------------------------------------------------------------------------
# Skips entirely on non-Debian systems. Safe for mixed-OS inventories.
# ---------------------------------------------------------------------------

- name: Install Node.js 20 LTS and build tools
  ansible.builtin.import_tasks: install.yml
  when: ansible_facts['os_family'] == "Debian"
  tags: [node, nodejs, devtools]

- name: Verify Node.js installation
  ansible.builtin.import_tasks: verify.yml
  when: ansible_facts['os_family'] == "Debian"
  tags: [node, nodejs, devtools]
